name: Deploy to Production

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"

      - run: flutter pub get
      - run: flutter build web --release --dart-define=API_BASE_URL=https://api.hermesops.site/api/v1 --dart-define=APP_ENV=production --dart-define=DEFAULT_COMPANY_CODE=3Y1FII

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - run: aws s3 sync build/web/ s3://taskmanager-staff-app/ --delete
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_DISTRIBUTION_ID }} --paths "/*"
