name: Deploy to Staging

on:
  push:
    branches: [staging]
    paths-ignore:
      - '*.md'
      - '.gitignore'

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/staff
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'

      - run: flutter pub get
      - run: flutter build web --release --dart-define=API_BASE_URL=https://stg-api.hermesops.site/api/v1 --dart-define=SITE_BASE_URL=https://stg.hermesops.site --dart-define=APP_ENV=staging

      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - run: aws s3 sync build/web/ s3://taskmanager-staff-app-staging/ --delete
      - run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CF_STAGING_DISTRIBUTION_ID }} --paths "/*"
