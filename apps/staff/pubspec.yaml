name: app
description: HTM Staff App
publish_to: 'none'
version: 1.0.5+21

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.0
  go_router: ^14.6.0
  dio: ^5.7.0
  shared_preferences: ^2.3.0
  intl: ^0.20.2
  image_picker: ^1.1.0
  wakelock_plus: ^1.2.8
  package_info_plus: ^8.0.0
  url_launcher: ^6.3.0
  htm_core:
    path: ../../packages/htm_core


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  generate: true
  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
          weight: 400
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
        - asset: assets/fonts/DMSans-ExtraBold.ttf
          weight: 800

